<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>基礎體溫記錄表</title>
<style>
  :root{
    --tiffany:#81d8d0; --tiffany-soft:#b8e4de; --tiffany-bg:#d6efeb;
    --bg:#d6efeb; --card:#ffffff; --line:#9ed3cb; --ink:#1f3d3a; --muted:#5a7a76;
    --accent:#c0392b; --accent2:#0aa29a; --ok:#16a34a;
    --orange:#f29849; --orange-dark:#d77a2c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-tap-highlight-color:transparent;
    background:var(--bg)
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 60 60'><g fill='%231f3d3a' opacity='0.05'><ellipse cx='15' cy='22' rx='5' ry='4'/><ellipse cx='10' cy='14' rx='2' ry='2.6'/><ellipse cx='20' cy='14' rx='2' ry='2.6'/><ellipse cx='6' cy='18' rx='1.6' ry='2.2'/><ellipse cx='24' cy='18' rx='1.6' ry='2.2'/><ellipse cx='42' cy='48' rx='5' ry='4'/><ellipse cx='37' cy='40' rx='2' ry='2.6'/><ellipse cx='47' cy='40' rx='2' ry='2.6'/><ellipse cx='33' cy='44' rx='1.6' ry='2.2'/><ellipse cx='51' cy='44' rx='1.6' ry='2.2'/></g></svg>");
  }
  header{position:sticky;top:0;
    background:linear-gradient(180deg,#a3ddd5 0%,#c6e9e3 100%);
    border-bottom:1px solid var(--line);
    padding:10px 12px;z-index:10;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;flex:1;color:#0f2e2b;letter-spacing:0.5px}
  header .who{font-size:12px;color:#3a5a56}
  .cat{width:44px;height:44px;flex-shrink:0;filter:drop-shadow(0 1px 1px rgba(0,0,0,.12))}
  .cat-sm{width:32px;height:32px}
  .sync-dot{width:10px;height:10px;border-radius:50%;background:#cfd8d6;flex-shrink:0;
    box-shadow:0 0 0 2px rgba(255,255,255,.7);transition:background .2s}
  .sync-dot.ok{background:#16a34a}
  .sync-dot.err{background:#dc2626}
  .sync-dot.syncing{background:#0aa29a;animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.4}}
  .section-title{font-size:13px;font-weight:600;color:#0f3a36;margin:14px 0 8px;padding-top:10px;border-top:1px solid var(--line)}
  main{padding:12px;max-width:880px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px;margin-bottom:12px;box-shadow:0 1px 2px rgba(31,61,58,.06)}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  label{font-size:13px;color:#444}
  input[type=text],input[type=date],input[type=number],input[type=month],select{
    padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;
    font-size:15px;min-width:0}
  input[type=number]{width:100px}
  button{padding:9px 12px;border:1px solid var(--line);background:#fff;border-radius:8px;
    font-size:14px;cursor:pointer}
  button.primary{background:var(--tiffany);color:#0f2e2b;border-color:var(--accent2);font-weight:600}
  button.primary:hover{background:var(--accent2);color:#fff}
  button.ghost{background:transparent}
  button.danger{color:#c0392b;border-color:#e8b6b0}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border:1px solid var(--line);
    border-radius:999px;font-size:12px;background:#fff;cursor:pointer;user-select:none}
  .pill.on{background:#fff3ec;border-color:var(--orange-dark);color:var(--orange-dark)}
  .pill .sym{font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .month-tabs{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
  .month-tabs button{padding:6px 10px;font-size:13px;min-width:44px}
  .month-tabs button.on{background:var(--tiffany);color:#0f2e2b;border-color:var(--accent2);font-weight:600}

  /* chart */
  .chart-wrap{overflow:hidden}
  svg.chart{display:block;background:#fff;width:100%;height:auto;max-width:640px;margin:0 auto;border-radius:6px}
  svg.chart .day-hit{fill:transparent;cursor:pointer}
  svg.chart .day-hit:hover{fill:rgba(129,216,208,0.25)}
  svg.chart .day-hit:active{fill:rgba(129,216,208,0.45)}

  /* day list */
  .day{display:flex;gap:8px;align-items:center;padding:8px 6px;border-bottom:1px dashed var(--line)}
  .day:last-child{border-bottom:0}
  .day .dt{width:60px;font-variant-numeric:tabular-nums;font-size:13px;color:#333}
  .day .tmp{width:80px;font-variant-numeric:tabular-nums;font-weight:700}
  .day .tags{flex:1;display:flex;flex-wrap:wrap;gap:4px;font-size:12px;color:#666}
  .day .edit{font-size:12px;color:var(--accent2);cursor:pointer}

  /* reminder */
  .reminder{background:#fff3e6;border:1px solid #f0c89a;color:#7a4500;
    padding:10px 12px;border-radius:12px;display:flex;align-items:center;gap:10px;
    margin-bottom:12px;box-shadow:0 1px 2px rgba(31,61,58,.06)}
  .reminder strong{color:#7a4500}
  .reminder button{margin-left:auto;background:var(--orange);color:#fff;border-color:var(--orange-dark)}
  .reminder.backup{background:#fdecec;border-color:#f5b7b1}
  .reminder.backup strong{color:#922b1f}
  .reminder.backup button{background:#c0392b;border-color:#922b1f}

  /* prediction */
  .stat{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
  .stat .box{background:#eaf6f4;border:1px solid var(--line);border-radius:10px;padding:10px}
  .stat .box .lbl{font-size:11px;color:#3a5a56}
  .stat .box .val{font-size:16px;font-weight:700;color:#0f3a36;margin-top:2px;font-variant-numeric:tabular-nums}
  .stat .box.warn{background:#fef2f2;border-color:#fecaca}
  .stat .box.warn .lbl{color:#991b1b}
  .stat .box.warn .val{color:#991b1b}
  .stat .box.ovu{background:#f0fdf4;border-color:#bbf7d0}
  .stat .box.ovu .lbl{color:#166534}
  .stat .box.ovu .val{color:#166534}

  /* modal */
  .mask{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;
    align-items:flex-end;justify-content:center;z-index:50}
  .mask.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:560px;border-radius:16px 16px 0 0;
    padding:16px;max-height:90vh;overflow:auto}
  .sheet h3{margin:0 0 10px}
  .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
  .hint{font-size:12px;color:var(--muted)}
  details summary{cursor:pointer;font-size:13px;color:#555;padding:4px 0}
  textarea{width:100%;min-height:60px;padding:8px;border:1px solid var(--line);border-radius:8px;
    font-family:inherit;font-size:14px}
  @media (min-width:560px){
    .sheet{border-radius:16px;align-self:center;margin:auto}
    .mask{align-items:center}
  }
</style>
</head>
<body>

<header>
  <svg class="cat" viewBox="0 0 60 60" aria-label="橘貓">
    <!-- 耳 -->
    <polygon points="14,26 19,12 25,23" fill="#f29849"/>
    <polygon points="46,26 41,12 35,23" fill="#f29849"/>
    <polygon points="16,23 19,16 23,22" fill="#fbbe87"/>
    <polygon points="44,23 41,16 37,22" fill="#fbbe87"/>
    <!-- 臉 -->
    <ellipse cx="30" cy="37" rx="19" ry="17" fill="#f29849"/>
    <!-- 條紋 -->
    <path d="M22,25 Q24,21 26,25 M34,25 Q36,21 38,25" stroke="#d77a2c" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M14,32 Q11,34 13,36 M46,32 Q49,34 47,36" stroke="#d77a2c" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- 嘴附近淺色 -->
    <ellipse cx="30" cy="43" rx="11" ry="7" fill="#fbd2a8"/>
    <!-- 眼 -->
    <circle cx="22" cy="37" r="2.6" fill="#1a1a1a"/>
    <circle cx="38" cy="37" r="2.6" fill="#1a1a1a"/>
    <circle cx="22.8" cy="36.3" r="0.8" fill="#fff"/>
    <circle cx="38.8" cy="36.3" r="0.8" fill="#fff"/>
    <!-- 鼻 -->
    <path d="M28.2,42.5 L31.8,42.5 L30,45 Z" fill="#e08aa5"/>
    <!-- 嘴 -->
    <path d="M30,45 Q27.5,47.5 25.5,46.5 M30,45 Q32.5,47.5 34.5,46.5" stroke="#5a4030" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- 鬍鬚 -->
    <line x1="10" y1="40" x2="18" y2="40" stroke="#8a6a40" stroke-width="0.6"/>
    <line x1="42" y1="40" x2="50" y2="40" stroke="#8a6a40" stroke-width="0.6"/>
    <line x1="11" y1="44" x2="18" y2="43" stroke="#8a6a40" stroke-width="0.6"/>
    <line x1="42" y1="43" x2="49" y2="44" stroke="#8a6a40" stroke-width="0.6"/>
    <!-- 紅貝雷帽 -->
    <ellipse cx="30" cy="14" rx="17" ry="4.5" fill="#c0392b"/>
    <ellipse cx="30" cy="11" rx="13.5" ry="6" fill="#c0392b"/>
    <ellipse cx="30" cy="15.5" rx="17" ry="1.5" fill="#922b1f"/>
    <circle cx="35" cy="6" r="2.4" fill="#922b1f"/>
  </svg>

  <svg class="cat" viewBox="0 0 60 60" aria-label="三花貓">
    <!-- 耳 -->
    <polygon points="14,26 19,12 25,23" fill="#f29849"/>
    <polygon points="46,26 41,12 35,23" fill="#2a2a2a"/>
    <polygon points="16,23 19,16 23,22" fill="#fbbe87"/>
    <polygon points="44,23 41,16 37,22" fill="#5a5a5a"/>
    <!-- 白底臉 -->
    <ellipse cx="30" cy="37" rx="19" ry="17" fill="#fafafa"/>
    <!-- 橘色色塊 -->
    <path d="M11,30 Q13,22 22,21 Q26,28 23,38 Q17,42 11,37 Z" fill="#f29849"/>
    <!-- 黑色色塊 -->
    <path d="M49,30 Q47,22 38,21 Q34,28 37,40 Q43,44 49,37 Z" fill="#2a2a2a"/>
    <!-- 小黑點 -->
    <ellipse cx="26" cy="48" rx="3" ry="2" fill="#2a2a2a" opacity="0.85"/>
    <!-- 眼 -->
    <circle cx="22" cy="37" r="2.6" fill="#1a1a1a"/>
    <circle cx="38" cy="37" r="2.6" fill="#fff5e0"/>
    <circle cx="38" cy="37" r="1.6" fill="#1a1a1a"/>
    <circle cx="22.8" cy="36.3" r="0.8" fill="#fff"/>
    <!-- 鼻 -->
    <path d="M28.2,42.5 L31.8,42.5 L30,45 Z" fill="#e08aa5"/>
    <!-- 嘴 -->
    <path d="M30,45 Q27.5,47.5 25.5,46.5 M30,45 Q32.5,47.5 34.5,46.5" stroke="#5a4030" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- 鬍鬚 -->
    <line x1="10" y1="40" x2="18" y2="40" stroke="#888" stroke-width="0.6"/>
    <line x1="42" y1="40" x2="50" y2="40" stroke="#888" stroke-width="0.6"/>
    <!-- 黃色報童帽 -->
    <ellipse cx="30" cy="15" rx="16" ry="4" fill="#f4c95d"/>
    <path d="M15,15 Q16,5 30,4 Q44,5 45,15 Z" fill="#f4c95d"/>
    <ellipse cx="30" cy="15.5" rx="16" ry="1.5" fill="#d4a93d"/>
    <circle cx="30" cy="5" r="1.8" fill="#d4a93d"/>
    <!-- 帽簷 -->
    <path d="M14,15 Q17,18 24,17" stroke="#d4a93d" stroke-width="1" fill="#f4c95d"/>
  </svg>

  <h1>基礎體溫記錄表</h1>
  <span class="who" id="profileLabel"></span>
  <span class="sync-dot" id="syncDot" title="尚未啟用同步"></span>
  <button class="ghost" id="btnSettings">設定</button>
</header>

<main>

  <div id="backupReminder" class="reminder backup" style="display:none">
    <span style="font-size:22px">💾</span>
    <div>
      <strong>該備份資料了</strong>
      <div class="hint" id="backupSub" style="color:#922b1f"></div>
    </div>
    <button id="btnBackupNow">立即備份</button>
  </div>

  <div id="reminder" class="reminder" style="display:none">
    <svg class="cat cat-sm" viewBox="0 0 60 60" aria-label="提醒貓">
      <polygon points="14,26 19,12 25,23" fill="#f29849"/>
      <polygon points="46,26 41,12 35,23" fill="#f29849"/>
      <polygon points="16,23 19,16 23,22" fill="#fbbe87"/>
      <polygon points="44,23 41,16 37,22" fill="#fbbe87"/>
      <ellipse cx="30" cy="37" rx="19" ry="17" fill="#f29849"/>
      <path d="M22,25 Q24,21 26,25 M34,25 Q36,21 38,25" stroke="#d77a2c" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <ellipse cx="30" cy="43" rx="11" ry="7" fill="#fbd2a8"/>
      <circle cx="22" cy="37" r="2.6" fill="#1a1a1a"/>
      <circle cx="38" cy="37" r="2.6" fill="#1a1a1a"/>
      <path d="M28.2,42.5 L31.8,42.5 L30,45 Z" fill="#e08aa5"/>
      <path d="M30,45 Q27.5,47.5 25.5,46.5 M30,45 Q32.5,47.5 34.5,46.5" stroke="#5a4030" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- 廚師帽 -->
      <rect x="20" y="11" width="20" height="5" fill="#fff" stroke="#d4a93d" stroke-width="0.6"/>
      <ellipse cx="25" cy="9" rx="5" ry="6" fill="#fff" stroke="#d4a93d" stroke-width="0.6"/>
      <ellipse cx="35" cy="9" rx="5" ry="6" fill="#fff" stroke="#d4a93d" stroke-width="0.6"/>
      <ellipse cx="30" cy="6" rx="6" ry="7" fill="#fff" stroke="#d4a93d" stroke-width="0.6"/>
    </svg>
    <div>
      <strong id="remindTitle">今天還沒記錄</strong>
      <div class="hint" id="remindSub" style="color:#7a5a00"></div>
    </div>
    <button id="btnRemind">立即記錄</button>
  </div>

  <div class="card" id="predictCard" style="display:none">
    <div class="row" style="justify-content:space-between">
      <strong>週期預測</strong>
      <span class="hint" id="predictHint"></span>
    </div>
    <div class="stat" id="predictStat"></div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between;margin-bottom:6px">
      <strong style="font-size:14px">月份</strong>
      <label style="font-size:12px;color:#3a5a56;cursor:pointer;user-select:none">
        <input type="checkbox" id="dualToggle" style="vertical-align:middle"> 雙月一起看
      </label>
    </div>
    <div class="month-tabs" id="monthTabs"></div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" width="900" height="360" viewBox="0 0 900 360"></svg>
    </div>
    <div class="row" style="justify-content:space-between;margin-top:6px">
      <span class="hint">
        <span style="color:#c0392b">● 體溫</span>　<span style="color:#2c7be5;font-weight:700">○</span> 夜尿　<span style="color:#c0392b;font-weight:700">✕</span> 半夜醒　<span style="color:#e0a800;font-weight:700">☆</span> 早醒　<span style="color:#7c3aed;font-weight:700">△</span> 晚睡　<span style="color:#ec4899;font-weight:700">◎</span> 行房　<span style="color:#16a34a;font-weight:700">□</span> 晚起
      </span>
      <span class="hint" id="rangeLabel"></span>
    </div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <strong>今日 / 補登</strong>
      <button class="primary" id="btnAdd">新增 / 編輯</button>
    </div>
    <div id="dayList" style="margin-top:8px"></div>
  </div>

  <div class="card">
    <details>
      <summary>資料管理（匯出 / 匯入 / 清除）</summary>
      <div class="row" style="margin-top:8px">
        <button id="btnBackupDrive" class="primary">💾 備份到 Google Drive</button>
        <button id="btnExport">匯出 CSV</button>
        <button id="btnExportJson">匯出 JSON 備份</button>
        <button id="btnImport">匯入 JSON</button>
        <input type="file" id="fileImport" accept="application/json,.json" style="display:none">
        <button class="danger" id="btnClear">清除所有資料</button>
      </div>
      <p class="hint" id="lastBackupHint" style="margin-top:8px">資料只存在本機瀏覽器（localStorage）。換手機/換瀏覽器請先備份。</p>
    </details>
  </div>

  <!-- 每次部署記得把版本號 +1，方便確認手機有沒有更新到 -->
  <p class="hint" style="text-align:center;opacity:.75">版本 v6（2026-06-12）</p>

</main>

<!-- 編輯 sheet -->
<div class="mask" id="editMask">
  <div class="sheet">
    <h3 id="editTitle">記錄</h3>
    <div class="row" style="margin-bottom:8px">
      <label>日期</label>
      <input type="date" id="fDate">
    </div>
    <div class="row" style="margin-bottom:8px">
      <label>基礎體溫 (°C)</label>
      <input type="number" id="fTemp" step="0.01" min="35" max="38" placeholder="例如 36.55">
    </div>
    <div class="row" style="margin-bottom:8px">
      <label>月經周期（第幾天）</label>
      <input type="number" id="fCycleDay" min="1" max="99" step="1" placeholder="例如 1" style="width:80px">
    </div>
    <div style="margin:6px 0">
      <label>行經期間</label>
      <div class="row" style="margin-top:6px" id="fPeriodRow">
        <span class="pill" data-period="">無</span>
        <span class="pill" data-period="多">多</span>
        <span class="pill" data-period="少">少</span>
        <span class="pill" data-period="other">其他</span>
        <input type="text" id="fPeriodTxt" maxlength="2" placeholder="二字內" style="width:80px;display:none">
      </div>
    </div>
    <div style="margin:6px 0">
      <label>白帶量</label>
      <div class="row" style="margin-top:6px" id="fDischargeRow">
        <span class="pill" data-discharge="">無</span>
        <span class="pill" data-discharge="多">多</span>
        <span class="pill" data-discharge="少">少</span>
      </div>
    </div>
    <div style="margin:8px 0">
      <label>備註（可多選）</label>
      <div class="row" style="margin-top:6px" id="fTagsRow"></div>
    </div>
    <div style="margin:8px 0">
      <label>其他備註</label>
      <textarea id="fNote" placeholder="自由文字…"></textarea>
    </div>
    <div class="actions">
      <button id="btnDelete" class="danger" style="margin-right:auto">刪除這天</button>
      <button id="btnCancel">取消</button>
      <button id="btnSave" class="primary">儲存</button>
    </div>
  </div>
</div>

<!-- 設定 sheet -->
<div class="mask" id="setMask">
  <div class="sheet">
    <h3>設定</h3>
    <div class="row" style="margin-bottom:8px">
      <label>姓名</label>
      <input type="text" id="sName" placeholder="自填">
    </div>
    <div class="row" style="margin-bottom:8px">
      <label>病歷號</label>
      <input type="text" id="sChart" placeholder="可空白">
    </div>
    <div class="row" style="margin-bottom:8px">
      <label>起始月份</label>
      <input type="month" id="sStart">
      <span class="hint">圖表會顯示此月起連續 8 個月</span>
    </div>

    <div class="section-title">☁️ GitHub 雲端同步（私密 Gist）</div>
    <div class="hint" style="margin-bottom:8px">
      資料會存到你 GitHub 的私密 Gist。換手機只要貼同一組 token，按「從雲端還原」就回來。
      <a href="https://github.com/settings/tokens?type=beta" target="_blank" style="color:var(--accent2)">取得 Token</a>
      （只需要 <code>gist</code> 權限）
    </div>
    <div class="row" style="margin-bottom:8px">
      <label>Token</label>
      <input type="password" id="sGhToken" placeholder="ghp_... 或 github_pat_..." style="flex:1">
    </div>
    <div class="row" style="margin-bottom:8px">
      <label style="cursor:pointer">
        <input type="checkbox" id="sGhAuto" style="vertical-align:middle"> 自動同步（資料變更後 3 秒自動 push）
      </label>
    </div>
    <div class="row" style="margin-bottom:8px">
      <button id="btnSyncNow">立即同步 ↑</button>
      <button id="btnRestore">從雲端還原 ↓</button>
      <span class="hint" id="syncStatus" style="flex:1"></span>
    </div>

    <div class="actions">
      <button id="btnSetCancel">取消</button>
      <button id="btnSetSave" class="primary">儲存</button>
    </div>
  </div>
</div>

<script>
/* ---------- 資料模型 ---------- */
const TAGS = [
  {k:'nocturia',  sym:'○', name:'夜尿',   color:'#2c7be5'},
  {k:'wakeMid',   sym:'✕', name:'半夜醒', color:'#c0392b'},
  {k:'wakeEarly', sym:'☆', name:'早醒',   color:'#e0a800'},
  {k:'lateSleep', sym:'△', name:'晚睡',   color:'#7c3aed'},
  {k:'sex',       sym:'◎', name:'行房',   color:'#ec4899'},
  {k:'lateRise',  sym:'□', name:'晚起',   color:'#16a34a'},
];
const LS_KEY = 'bbt-tracker-v1';

function loadAll(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)) || defaultState(); }
  catch(e){ return defaultState(); }
}
function defaultState(){
  const now = new Date();
  const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
  return { profile:{name:'',chart:''}, startMonth:`${y}-${m}`, records:{}, activeMonthIdx:0, lastBackupAt:null, dualMode:false };
}
function save(){
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  scheduleSync();
}

let state = loadAll();

/* ---------- GitHub Gist 同步 ---------- */
const GH_LS = 'bbt-gh-config-v1';
function loadGh(){
  try{ return JSON.parse(localStorage.getItem(GH_LS)) || { token:'', gistId:'', autoSync:false, lastSyncAt:null }; }
  catch(e){ return { token:'', gistId:'', autoSync:false, lastSyncAt:null }; }
}
function saveGh(){ localStorage.setItem(GH_LS, JSON.stringify(gh)); }
let gh = loadGh();

const GIST_FILENAME = 'bbt-data.json';
const GIST_DESC = 'BBT tracker auto-sync (do not delete)';

function setSyncStatus(state, msg){
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state ? ' '+state : '');
  dot.title = msg || '';
  const ss = document.getElementById('syncStatus');
  if(ss) ss.textContent = msg || '';
}

async function ghApi(path, opts={}){
  if(!gh.token) throw new Error('未設定 Token');
  const res = await fetch(`https://api.github.com${path}`, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${gh.token}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(opts.headers||{})
    },
  });
  if(!res.ok){
    const txt = await res.text().catch(()=> '');
    throw new Error(`GitHub ${res.status}: ${txt.slice(0,120)}`);
  }
  return res.json();
}

async function findExistingGist(){
  const list = await ghApi('/gists?per_page=100');
  return list.find(g => g.description === GIST_DESC) || null;
}

async function syncToGist(){
  if(!gh.token){ setSyncStatus('', '未啟用同步'); return; }
  setSyncStatus('syncing', '同步中…');
  try {
    const payload = JSON.stringify(state, null, 2);
    const files = { [GIST_FILENAME]: { content: payload } };

    if(!gh.gistId){
      // 先找看看雲端有沒有舊的
      const existing = await findExistingGist();
      if(existing){ gh.gistId = existing.id; saveGh(); }
    }

    if(gh.gistId){
      await ghApi(`/gists/${gh.gistId}`, {
        method:'PATCH',
        body: JSON.stringify({ files })
      });
    } else {
      const created = await ghApi('/gists', {
        method:'POST',
        body: JSON.stringify({ description: GIST_DESC, public:false, files })
      });
      gh.gistId = created.id;
    }
    gh.lastSyncAt = new Date().toISOString();
    saveGh();
    setSyncStatus('ok', `已同步 ${new Date().toLocaleTimeString('zh-TW',{hour12:false})}`);
  } catch(e){
    console.error(e);
    setSyncStatus('err', '同步失敗：'+e.message);
  }
}

async function restoreFromGist(){
  if(!gh.token){ alert('請先填 Token'); return; }
  setSyncStatus('syncing', '還原中…');
  try {
    if(!gh.gistId){
      const existing = await findExistingGist();
      if(!existing){ setSyncStatus('err','雲端找不到備份'); alert('雲端找不到備份。可能需要先在舊裝置點一次「立即同步」。'); return; }
      gh.gistId = existing.id; saveGh();
    }
    const data = await ghApi(`/gists/${gh.gistId}`);
    const content = data.files?.[GIST_FILENAME]?.content;
    if(!content) throw new Error('Gist 內找不到資料檔');
    const restored = JSON.parse(content);
    if(!restored.records) throw new Error('資料格式不正確');
    if(!confirm('從雲端還原會覆蓋目前所有資料，確定？')) { setSyncStatus(gh.lastSyncAt?'ok':'', ''); return; }
    state = restored;
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    setSyncStatus('ok', '已從雲端還原');
    renderAll();
  } catch(e){
    console.error(e);
    setSyncStatus('err','還原失敗：'+e.message);
    alert('還原失敗：'+e.message);
  }
}

// 防抖：資料變動 3 秒後才同步，避免每次按鍵都打 API
let syncTimer = null;
function scheduleSync(){
  if(!gh.autoSync || !gh.token) return;
  clearTimeout(syncTimer);
  setSyncStatus('syncing','即將同步…');
  syncTimer = setTimeout(syncToGist, 3000);
}

function refreshSyncDot(){
  if(!gh.token){ setSyncStatus('', '尚未設定 Token'); return; }
  if(!gh.autoSync){ setSyncStatus('', '已停用自動同步'); return; }
  if(gh.lastSyncAt){
    setSyncStatus('ok', `上次同步：${new Date(gh.lastSyncAt).toLocaleString('zh-TW',{hour12:false})}`);
  } else {
    setSyncStatus('', '尚未同步');
  }
}

/* ---------- 月份工具 ---------- */
function monthDays(ym){
  const [y,m] = ym.split('-').map(Number);
  return new Date(y, m, 0).getDate();
}
function addMonth(ym, n){
  const [y,m] = ym.split('-').map(Number);
  const d = new Date(y, m-1+n, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function dateKey(ym, day){ return `${ym}-${String(day).padStart(2,'0')}`; }
function parseDate(s){
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d, 12, 0, 0);
}
function fmtDate(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysBetween(a, b){ return Math.round((b - a) / 86400000); }
function addDays(s, n){ const d = parseDate(s); d.setDate(d.getDate()+n); return fmtDate(d); }
function todayKey(){ return fmtDate(new Date()); }

/* ---------- 週期預測 ---------- */
function computePrediction(){
  const keys = Object.keys(state.records).sort();
  // 經期開始＝「月經周期」填 1 的那天
  let periodStarts = keys.filter(k => (state.records[k]||{}).cycleDay === 1);
  if(!periodStarts.length){
    // 相容舊資料：用以前的月經/出血量記錄推斷
    periodStarts = [];
    let inPeriod = false, lastDate = null;
    for(const k of keys){
      const r = state.records[k];
      const has = r && r.flow && r.flow !== 'none';
      if(has){
        let newStart = !inPeriod;
        if(inPeriod && lastDate && daysBetween(parseDate(lastDate), parseDate(k)) > 2) newStart = true;
        if(newStart) periodStarts.push(k);
        inPeriod = true; lastDate = k;
      } else if(lastDate && daysBetween(parseDate(lastDate), parseDate(k)) > 2){
        inPeriod = false;
      }
    }
  }
  const intervals = [];
  for(let i=1;i<periodStarts.length;i++){
    intervals.push(daysBetween(parseDate(periodStarts[i-1]), parseDate(periodStarts[i])));
  }
  const avgLen = intervals.length
    ? Math.round(intervals.reduce((a,b)=>a+b,0)/intervals.length) : null;

  const lastStart = periodStarts[periodStarts.length-1] || null;
  let nextStart=null, ovulation=null, fertileStart=null, fertileEnd=null;
  if(lastStart && avgLen){
    nextStart   = addDays(lastStart, avgLen);
    ovulation   = addDays(nextStart, -14);
    fertileStart= addDays(ovulation, -5);
    fertileEnd  = addDays(ovulation,  1);
  }
  return { periodStarts, intervals, avgLen, lastStart,
           nextStart, ovulation, fertileStart, fertileEnd };
}

/* ---------- 實際排卵判讀（雙相覆蓋線法） ---------- */
function detectOvulations(){
  const keys = Object.keys(state.records).sort();
  const periodStarts = computePrediction().periodStarts;
  if(!periodStarts.length) return [];

  const cycles = [];
  for(let i=0;i<periodStarts.length;i++){
    const start = periodStarts[i];
    const end = (i+1<periodStarts.length) ? addDays(periodStarts[i+1],-1) : todayKey();
    cycles.push({start, end});
  }

  const result = [];
  for(const c of cycles){
    const temps = [];
    for(const k of keys){
      if(k < c.start || k > c.end) continue;
      const r = state.records[k];
      if(!r || typeof r.temp !== 'number') continue;
      if((r.flow && r.flow !== 'none') || r.cycleDay) continue; // 月經期略過
      temps.push({date:k, temp:r.temp});
    }
    if(temps.length < 9) continue;

    for(let i=6; i<=temps.length-3; i++){
      const baseline = temps.slice(i-6, i).map(x=>x.temp);
      const cover = Math.max(...baseline);
      const next3 = temps.slice(i, i+3);
      const allHi = next3.every(x => x.temp > cover + 0.1);
      const oneSig = next3.some(x => x.temp >= cover + 0.2);
      if(allHi && oneSig){
        result.push({ date: temps[i-1].date, cover, cycleStart: c.start });
        break;
      }
    }
  }
  return result;
}

/* ---------- 渲染：月份分頁 ---------- */
const MONTH_TABS = 8;

function getView(){
  const months = [];
  const want = state.dualMode ? 2 : 1;
  let totalDays = 0;
  for(let i=0;i<want;i++){
    const idx = state.activeMonthIdx + i;
    if(idx >= MONTH_TABS) break;
    const ym = addMonth(state.startMonth, idx);
    const days = monthDays(ym);
    months.push({ ym, days, offset: totalDays, idx });
    totalDays += days;
  }
  return { months, totalDays };
}

function renderTabs(){
  const tabs = document.getElementById('monthTabs');
  tabs.innerHTML = '';
  const view = getView();
  const activeSet = new Set(view.months.map(m => m.idx));
  for(let i=0;i<MONTH_TABS;i++){
    const ym = addMonth(state.startMonth, i);
    const m = Number(ym.slice(5,7));
    const b = document.createElement('button');
    b.textContent = `${m}月`;
    if(activeSet.has(i)) b.classList.add('on');
    b.onclick = ()=>{
      // 雙月模式時，點到最後一個月份就退回一格，避免越界
      if(state.dualMode && i === MONTH_TABS - 1) state.activeMonthIdx = i - 1;
      else state.activeMonthIdx = i;
      save(); renderAll();
    };
    tabs.appendChild(b);
  }
  const rl = document.getElementById('rangeLabel');
  rl.textContent = `${state.startMonth} ～ ${addMonth(state.startMonth, MONTH_TABS-1)}`;
  document.getElementById('dualToggle').checked = !!state.dualMode;
}

document.getElementById('dualToggle').onchange = (e)=>{
  state.dualMode = e.target.checked;
  // 確保 activeMonthIdx 在雙月時不會越界
  if(state.dualMode && state.activeMonthIdx >= MONTH_TABS - 1){
    state.activeMonthIdx = MONTH_TABS - 2;
  }
  save(); renderAll();
};

/* ---------- 渲染：圖表（支援單月 / 雙月） ---------- */
function renderChart(){
  const svg = document.getElementById('chart');
  const view = getView();
  const totalDays = view.totalDays;

  const W = 360;
  const padL = 26, padR = 4, padB = 48;
  // 圖表上方表頭列：日期 / 月經周期 / 行經期間 / 白帶量
  const HR = [
    {key:'date',      label:'日期',     h:9},
    {key:'cycleDay',  label:'月經周期', h:9},
    {key:'periodTxt', label:'行經期間', h:13},
    {key:'discharge', label:'白帶量',   h:9},
  ];
  const headerTop = 3;
  let hAcc = headerTop;
  HR.forEach(r=>{ r.top = hAcc; hAcc += r.h; });
  const headerBot = hAcc;
  const padT = headerBot;  // 表頭直接貼著體溫圖，合為一張表
  const plotH = 216;
  const H = padT + plotH + padB;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.removeAttribute('width');

  const plotW = W - padL - padR;

  const tMin = 36.00, tMax = 37.30;
  const xOfIdx = idx => padL + idx * (plotW / Math.max(totalDays - 1, 1));
  const xOfDate = dateStr => {
    const m = view.months.find(mm => dateStr.startsWith(mm.ym));
    if(!m) return null;
    return xOfIdx(m.offset + Number(dateStr.slice(8,10)) - 1);
  };
  const y = t => padT + (tMax - t) / (tMax - tMin) * plotH;

  let g = '';

  // 格線樣式：綠色實線框（紙本體溫表風）+ 每格中間淺藍虛線
  const GB = '#2f9e63';   // 綠色框線
  const GS = '#bfe3cf';   // 淡綠細格線
  const colW0 = plotW / Math.max(totalDays - 1, 1);
  const cellL = padL - colW0/2;                                    // 格子區左緣
  const tableR = Math.min(W - 1, padL + (totalDays - 0.5) * colW0);

  // y 軸橫格線（綠色實線）
  for(let t=tMin*100; t<=tMax*100+0.5; t+=5){
    const tv = t/100;
    const yy = y(tv);
    const major = (Math.round(tv*100) % 10 === 0);
    g += `<line x1="${cellL}" x2="${tableR}" y1="${yy}" y2="${yy}"
           stroke="${major?GB:GS}" stroke-width="${major?0.5:0.3}"/>`;
    if(major){
      g += `<text x="${cellL-2}" y="${yy+2.5}" text-anchor="end" font-size="7" fill="#5a7a76">${tv.toFixed(2)}</text>`;
    }
  }
  [36.50, 37.00].forEach(tv=>{
    g += `<line x1="${cellL}" x2="${tableR}" y1="${y(tv)}" y2="${y(tv)}" stroke="${GB}" stroke-width="1.1"/>`;
  });

  // 直格線：格子框線（綠色實線，從表頭貫穿到體溫圖底，全部對齊）
  for(let i=0; i<=totalDays; i++){
    const bx = padL + (i - 0.5) * colW0;
    g += `<line x1="${bx}" x2="${bx}" y1="${headerTop}" y2="${H-padB}" stroke="${GB}" stroke-width="0.45"/>`;
  }
  // 每格中間：淺藍色虛線（記錄體溫用，體溫點落在這條線上）
  view.months.forEach((m, mi)=>{
    for(let d=1; d<=m.days; d++){
      const xx = xOfIdx(m.offset + d - 1);
      g += `<line x1="${xx}" x2="${xx}" y1="${padT}" y2="${H-padB}" stroke="#8ec5e8" stroke-width="0.45" stroke-dasharray="1.6 1.6"/>`;
    }
    // 月份分隔線（雙月時）
    if(mi > 0){
      const xx = xOfIdx(m.offset) - colW0/2;
      g += `<line x1="${xx}" x2="${xx}" y1="${headerTop}" y2="${H-4}" stroke="#0aa29a" stroke-width="1.2"/>`;
    }
    // 月份標題（雙月時顯示）
    if(view.months.length > 1){
      const mid = xOfIdx(m.offset + m.days/2 - 0.5);
      g += `<text x="${mid}" y="${padT+8}" text-anchor="middle" font-size="9" fill="#0f3a36" font-weight="700" opacity="0.45">${Number(m.ym.slice(5,7))}月</text>`;
    }
  });

  // 表頭橫線（綠色，與格子對齊）
  HR.forEach(r=>{
    g += `<line x1="1" x2="${tableR}" y1="${r.top + r.h}" y2="${r.top + r.h}" stroke="${GB}" stroke-width="0.5"/>`;
  });
  // 整張表外框（含表頭與體溫圖）
  g += `<rect x="1" y="${headerTop}" width="${tableR - 1}" height="${H - padB - headerTop}" fill="none" stroke="${GB}" stroke-width="1.1"/>`;
  // 列標籤
  HR.forEach(r=>{
    g += `<text x="19" y="${r.top + r.h/2 + 1.7}" text-anchor="end" font-size="4.5" fill="#3a5a56" font-weight="600">${r.label}</text>`;
  });
  // 每日表頭內容
  const hf = totalDays > 35 ? 4.2 : 6;
  view.months.forEach(m=>{
    for(let d=1; d<=m.days; d++){
      const xx = xOfIdx(m.offset + d - 1);
      const rec = state.records[dateKey(m.ym, d)] || {};
      // 日期（每日顯示）
      g += `<text x="${xx}" y="${HR[0].top + HR[0].h - 2.5}" text-anchor="middle" font-size="${hf}" fill="#5a7a76">${d}</text>`;
      // 月經周期第幾天
      if(rec.cycleDay){
        g += `<text x="${xx}" y="${HR[1].top + HR[1].h - 2.5}" text-anchor="middle" font-size="${hf}" fill="#c0392b" font-weight="700">${rec.cycleDay}</text>`;
      }
      // 行經期間（二字直排）
      if(rec.periodTxt){
        String(rec.periodTxt).slice(0,2).split('').forEach((ch,ci)=>{
          g += `<text x="${xx}" y="${HR[2].top + 5.4 + ci*5.8}" text-anchor="middle" font-size="5" fill="#7c3aed" font-weight="600">${escapeHtml(ch)}</text>`;
        });
      }
      // 白帶量（多/少）
      if(rec.discharge){
        g += `<text x="${xx}" y="${HR[3].top + HR[3].h - 2.5}" text-anchor="middle" font-size="5" fill="${rec.discharge==='多' ? '#0aa29a' : '#8aa6a2'}" font-weight="700">${escapeHtml(rec.discharge)}</text>`;
      }
    }
  });

  // 備註符號（圖表下方，每個符號固定位置 + 顏色）
  const tagBase = H - padB + 8;
  view.months.forEach(m=>{
    for(let d=1; d<=m.days; d++){
      const r = state.records[dateKey(m.ym, d)];
      if(!r || !r.tags || !r.tags.length) continue;
      const xx = xOfIdx(m.offset + d - 1);
      TAGS.forEach((t, ti)=>{
        if(r.tags.includes(t.k)){
          g += `<text x="${xx}" y="${tagBase + ti*6.5}" text-anchor="middle" font-size="6.5" fill="${t.color}" font-weight="700">${t.sym}</text>`;
        }
      });
    }
  });

  // 體溫折線（跨月可連續）
  let pathParts = [];
  let lastIdx = null;
  view.months.forEach(m=>{
    for(let d=1; d<=m.days; d++){
      const r = state.records[dateKey(m.ym, d)];
      const idx = m.offset + d - 1;
      if(r && typeof r.temp === 'number' && !isNaN(r.temp)){
        const px = xOfIdx(idx), py = y(r.temp);
        if(lastIdx === idx - 1) pathParts.push(`L${px},${py}`);
        else pathParts.push(`M${px},${py}`);
        lastIdx = idx;
      } else {
        lastIdx = null;
      }
    }
  });
  if(pathParts.length){
    g += `<path d="${pathParts.join(' ')}" fill="none" stroke="#c0392b" stroke-width="1.1"/>`;
  }

  // 體溫點
  view.months.forEach(m=>{
    for(let d=1; d<=m.days; d++){
      const r = state.records[dateKey(m.ym, d)];
      if(!r) continue;
      const xx = xOfIdx(m.offset + d - 1);
      if(typeof r.temp === 'number' && !isNaN(r.temp)){
        const yy = y(r.temp);
        g += `<circle cx="${xx}" cy="${yy}" r="1.6" fill="#c0392b"/>`;
      }
    }
  });

  // 透明點擊區（含上方表頭，點任一格都能編輯）
  const colW = plotW / totalDays;
  const hitH = H - 4 - headerTop;
  view.months.forEach(m=>{
    for(let d=1; d<=m.days; d++){
      const xx = xOfIdx(m.offset + d - 1);
      const dk = dateKey(m.ym, d);
      g += `<rect class="day-hit" data-key="${dk}" x="${xx - colW/2}" y="${headerTop}" width="${colW}" height="${hitH}"><title>${dk}</title></rect>`;
    }
  });

  svg.innerHTML = g;
  svg.querySelectorAll('.day-hit').forEach(el=>{
    el.addEventListener('click', ()=> openEdit(el.dataset.key));
  });
}

/* ---------- 渲染：當月每日清單（單月 / 雙月） ---------- */
function renderDayList(){
  const list = document.getElementById('dayList');
  const view = getView();
  const keys = [];
  view.months.forEach(m=>{
    for(let d=1; d<=m.days; d++){
      const k = dateKey(m.ym, d);
      if(state.records[k]) keys.push(k);
    }
  });
  keys.sort((a,b)=> b.localeCompare(a)); // 新到舊

  let html = '';
  for(const key of keys){
    const r = state.records[key];
    const tags = (r.tags||[]).map(k=>{
      const t = TAGS.find(x=>x.k===k);
      return t ? `<span style="color:${t.color};font-weight:700">${t.sym}</span>${t.name}` : '';
    }).join('  ');
    const extras = [];
    if(r.cycleDay) extras.push(`週期第${r.cycleDay}天`);
    if(r.periodTxt) extras.push(escapeHtml(r.periodTxt));
    if(r.discharge) extras.push('白帶'+r.discharge);
    html += `<div class="day">
      <span class="dt">${key.slice(5)}</span>
      <span class="tmp">${typeof r.temp==='number' ? r.temp.toFixed(2)+'°C' : '—'}</span>
      <span class="tags">${extras.join(' ')} ${tags} ${r.note?('・'+escapeHtml(r.note)):''}</span>
      <span class="edit" data-k="${key}">編輯</span>
    </div>`;
  }
  if(!html){
    html = `<div class="hint" style="padding:8px 4px">這${view.months.length>1?'些':'個'}月還沒有記錄，點右上「新增 / 編輯」開始。</div>`;
  }
  list.innerHTML = html;
  list.querySelectorAll('.edit').forEach(el=>{
    el.onclick = ()=> openEdit(el.dataset.k);
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* ---------- 編輯 sheet ---------- */
let editingKey = null;

function openEdit(key){
  // 預設今天
  if(!key){
    const t = new Date();
    key = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  }
  editingKey = key;
  const r = state.records[key] || {};
  document.getElementById('fDate').value = key;
  document.getElementById('fTemp').value = (typeof r.temp==='number') ? r.temp : '';
  document.getElementById('fNote').value = r.note || '';

  // 月經周期 / 行經期間 / 白帶量
  document.getElementById('fCycleDay').value = (typeof r.cycleDay==='number') ? r.cycleDay : '';
  const pt = r.periodTxt || '';
  const ptPreset = (pt==='' || pt==='多' || pt==='少') ? pt : 'other';
  document.querySelectorAll('#fPeriodRow .pill').forEach(p=>{
    p.classList.toggle('on', p.dataset.period === ptPreset);
  });
  const ptInput = document.getElementById('fPeriodTxt');
  ptInput.style.display = (ptPreset==='other') ? '' : 'none';
  ptInput.value = (ptPreset==='other') ? pt : '';
  document.querySelectorAll('#fDischargeRow .pill').forEach(p=>{
    p.classList.toggle('on', p.dataset.discharge === (r.discharge||''));
  });

  // tags
  const tagsRow = document.getElementById('fTagsRow');
  tagsRow.innerHTML = '';
  TAGS.forEach(t=>{
    const el = document.createElement('span');
    el.className = 'pill';
    el.innerHTML = `<span class="sym" style="color:${t.color}">${t.sym}</span> ${t.name}`;
    el.dataset.k = t.k;
    if(r.tags && r.tags.includes(t.k)) el.classList.add('on');
    el.onclick = ()=> el.classList.toggle('on');
    tagsRow.appendChild(el);
  });

  document.getElementById('editTitle').textContent = `記錄 ${key}`;
  document.getElementById('editMask').classList.add('show');
}

document.getElementById('btnAdd').onclick = ()=> openEdit(null);
document.getElementById('btnCancel').onclick = closeEdit;
document.getElementById('editMask').addEventListener('click', e=>{
  if(e.target.id==='editMask') closeEdit();
});
function closeEdit(){ document.getElementById('editMask').classList.remove('show'); }

document.querySelectorAll('#fDischargeRow .pill').forEach(p=>{
  p.onclick = ()=>{
    document.querySelectorAll('#fDischargeRow .pill').forEach(x=>x.classList.remove('on'));
    p.classList.add('on');
  };
});

document.querySelectorAll('#fPeriodRow .pill').forEach(p=>{
  p.onclick = ()=>{
    document.querySelectorAll('#fPeriodRow .pill').forEach(x=>x.classList.remove('on'));
    p.classList.add('on');
    const inp = document.getElementById('fPeriodTxt');
    if(p.dataset.period === 'other'){ inp.style.display=''; inp.focus(); }
    else { inp.style.display='none'; }
  };
});

document.getElementById('btnSave').onclick = ()=>{
  const key = document.getElementById('fDate').value;
  if(!key){ alert('請選擇日期'); return; }
  const tempStr = document.getElementById('fTemp').value.trim();
  let temp = null;
  if(tempStr !== ''){
    temp = parseFloat(tempStr);
    if(isNaN(temp) || temp < 34 || temp > 40){
      alert('體溫看起來不對，請輸入 34–40°C 之間'); return;
    }
  }
  const tags = Array.from(document.querySelectorAll('#fTagsRow .pill.on')).map(p=>p.dataset.k);
  const note = document.getElementById('fNote').value.trim();

  const cdStr = document.getElementById('fCycleDay').value.trim();
  let cycleDay = null;
  if(cdStr !== ''){
    cycleDay = parseInt(cdStr, 10);
    if(isNaN(cycleDay) || cycleDay < 1 || cycleDay > 99){
      alert('月經周期天數請輸入 1–99'); return;
    }
  }
  const ptPill = (document.querySelector('#fPeriodRow .pill.on')||{}).dataset?.period || '';
  const periodTxt = ptPill==='other'
    ? document.getElementById('fPeriodTxt').value.trim().slice(0,2)
    : ptPill;
  const discharge = (document.querySelector('#fDischargeRow .pill.on')||{}).dataset?.discharge || '';

  const rec = { temp:(temp===null?undefined:temp), tags, note,
                cycleDay:(cycleDay===null?undefined:cycleDay),
                periodTxt:(periodTxt||undefined),
                discharge:(discharge||undefined) };
  if(temp===null && tags.length===0 && !note
     && cycleDay===null && !periodTxt && !discharge){
    delete state.records[key];
  } else {
    state.records[key] = rec;
  }
  save(); closeEdit(); renderAll();
};

document.getElementById('btnDelete').onclick = ()=>{
  const key = document.getElementById('fDate').value;
  if(!key) return;
  if(!confirm(`刪除 ${key} 的記錄？`)) return;
  delete state.records[key];
  save(); closeEdit(); renderAll();
};

/* ---------- 設定 ---------- */
document.getElementById('btnSettings').onclick = ()=>{
  document.getElementById('sName').value = state.profile.name || '';
  document.getElementById('sChart').value = state.profile.chart || '';
  document.getElementById('sStart').value = state.startMonth;
  document.getElementById('sGhToken').value = gh.token || '';
  document.getElementById('sGhAuto').checked = !!gh.autoSync;
  refreshSyncDot();
  document.getElementById('setMask').classList.add('show');
};
document.getElementById('btnSetCancel').onclick = ()=>{
  document.getElementById('setMask').classList.remove('show');
};
document.getElementById('setMask').addEventListener('click', e=>{
  if(e.target.id==='setMask') document.getElementById('setMask').classList.remove('show');
});
document.getElementById('btnSetSave').onclick = ()=>{
  state.profile.name = document.getElementById('sName').value.trim();
  state.profile.chart = document.getElementById('sChart').value.trim();
  const sm = document.getElementById('sStart').value;
  if(sm) state.startMonth = sm;
  // GitHub 同步設定
  const newToken = document.getElementById('sGhToken').value.trim();
  const newAuto = document.getElementById('sGhAuto').checked;
  const tokenChanged = newToken !== gh.token;
  gh.token = newToken;
  gh.autoSync = newAuto;
  if(tokenChanged) gh.gistId = ''; // 換 token 就重找 gist
  saveGh();
  save();
  document.getElementById('setMask').classList.remove('show');
  renderAll();
  refreshSyncDot();
};

document.getElementById('btnSyncNow').onclick = ()=> syncToGist();
document.getElementById('btnRestore').onclick = ()=> restoreFromGist();

/* ---------- 匯出 / 匯入 ---------- */
document.getElementById('btnExport').onclick = ()=>{
  const rows = [['date','temp','flow','cycleDay','periodTxt','discharge','tags','note']];
  Object.keys(state.records).sort().forEach(k=>{
    const r = state.records[k];
    rows.push([k, (typeof r.temp==='number'?r.temp:''), r.flow||'',
      (typeof r.cycleDay==='number'?r.cycleDay:''), r.periodTxt||'', r.discharge||'',
      (r.tags||[]).join('|'), (r.note||'').replace(/\n/g,' ')]);
  });
  const csv = rows.map(r => r.map(c => {
    const s = String(c);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
  downloadFile('bbt-' + state.startMonth + '.csv', '﻿'+csv, 'text/csv');
};
document.getElementById('btnExportJson').onclick = ()=>{
  downloadFile('bbt-backup-' + new Date().toISOString().slice(0,10) + '.json',
    JSON.stringify(state,null,2), 'application/json');
  markBackedUp();
};

async function backupToDrive(){
  const json = JSON.stringify(state, null, 2);
  const fname = `bbt-backup-${todayKey()}.json`;

  // 1) 手機優先：Web Share API → 直接分享到 Drive App / LINE / Email
  try {
    const file = new File([json], fname, {type:'application/json'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:'BBT 備份', text:'基礎體溫資料備份'});
      markBackedUp();
      return;
    }
  } catch(e){
    if(e.name === 'AbortError'){ return; }  // 使用者取消
  }

  // 2) 電腦/不支援 share：下載檔案 + 開 Drive 上傳頁
  downloadFile(fname, json, 'application/json');
  setTimeout(()=> window.open('https://drive.google.com/drive/my-drive', '_blank'), 300);
  markBackedUp();
  alert(`✅ 備份檔已下載：${fname}\n📁 Google Drive 已在新分頁打開，請把檔案拖進去（或點右上「新增」→ 上傳）`);
}

function markBackedUp(){
  state.lastBackupAt = todayKey();
  save();
  renderBackupReminder();
}

document.getElementById('btnBackupDrive').onclick = backupToDrive;
document.getElementById('btnBackupNow').onclick = backupToDrive;
document.getElementById('btnImport').onclick = ()=> document.getElementById('fileImport').click();
document.getElementById('fileImport').onchange = (e)=>{
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data.records) throw new Error('格式不對');
      if(!confirm('匯入會覆蓋目前資料，繼續？')) return;
      state = data; save(); renderAll();
      alert('匯入完成');
    }catch(err){ alert('匯入失敗：' + err.message); }
  };
  reader.readAsText(f);
  e.target.value = '';
};
document.getElementById('btnClear').onclick = ()=>{
  if(!confirm('真的要清除所有記錄？此操作無法復原（建議先匯出備份）')) return;
  state = defaultState(); save(); renderAll();
};
function downloadFile(name, content, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

/* ---------- 提醒 ---------- */
function renderReminder(){
  const k = todayKey();
  const r = state.records[k];
  const need = !r || typeof r.temp !== 'number';
  const box = document.getElementById('reminder');
  box.style.display = need ? 'flex' : 'none';
  document.getElementById('remindSub').textContent = `${k}　測完體溫順手記一下吧`;
  document.getElementById('btnRemind').onclick = ()=> openEdit(k);
}

function renderBackupReminder(){
  const box = document.getElementById('backupReminder');
  const sub = document.getElementById('backupSub');
  const hint = document.getElementById('lastBackupHint');
  const hasData = Object.keys(state.records).length > 0;
  const last = state.lastBackupAt;
  const today = todayKey();
  const daysSince = last ? daysBetween(parseDate(last), parseDate(today)) : null;

  // 7 天沒備份、或從沒備份卻有資料 → 顯示紅色提醒
  const need = hasData && (!last || daysSince >= 7);
  box.style.display = need ? 'flex' : 'none';
  if(need){
    sub.textContent = last
      ? `上次備份：${last}（已 ${daysSince} 天）　點下方按鈕一鍵備份到 Drive`
      : `從未備份過。萬一手機壞掉資料會全沒！`;
  }
  if(last){
    hint.textContent = `上次備份：${last}（${daysSince} 天前）。資料只存本機瀏覽器，建議每週備份一次。`;
  } else {
    hint.textContent = '尚未備份過。資料只存本機瀏覽器，建議現在就備份一次。';
  }
}

/* ---------- 預測卡 ---------- */
function renderPrediction(){
  const p = computePrediction();
  const card = document.getElementById('predictCard');
  if(!p.lastStart){ card.style.display='none'; return; }
  card.style.display='';

  const today = todayKey();
  const stat = document.getElementById('predictStat');
  let boxes = [];
  boxes.push(`<div class="box"><div class="lbl">最近一次月經</div><div class="val">${p.lastStart}</div></div>`);

  const ovs = detectOvulations();
  if(ovs.length){
    const last = ovs[ovs.length-1];
    const dago = daysBetween(parseDate(last.date), parseDate(today));
    let agoText;
    if(dago===0) agoText='今天';
    else if(dago>0) agoText=`${dago} 天前`;
    else agoText=`${-dago} 天後`;
    boxes.push(`<div class="box ovu"><div class="lbl">實際排卵（體溫判讀）</div><div class="val">${last.date}（${agoText}）</div></div>`);
  }

  if(p.avgLen){
    boxes.push(`<div class="box"><div class="lbl">平均週期</div><div class="val">${p.avgLen} 天</div></div>`);

    const dn = daysBetween(parseDate(today), parseDate(p.nextStart));
    let text, cls='';
    if(dn>0) text = `${p.nextStart}（還有 ${dn} 天）`;
    else if(dn===0) text = `${p.nextStart}（就是今天）`;
    else { text = `${p.nextStart}（已晚 ${-dn} 天）`; cls=' warn'; }
    boxes.push(`<div class="box${cls}"><div class="lbl">下次月經預計</div><div class="val">${text}</div></div>`);

    const dov = daysBetween(parseDate(today), parseDate(p.ovulation));
    let ovText;
    if(dov>0) ovText = `${p.ovulation}（還有 ${dov} 天）`;
    else if(dov===0) ovText = `${p.ovulation}（就是今天）`;
    else ovText = `${p.ovulation}（${-dov} 天前）`;
    boxes.push(`<div class="box ovu"><div class="lbl">下次排卵預計</div><div class="val">${ovText}</div></div>`);
  } else {
    boxes.push(`<div class="box"><div class="lbl">平均週期</div><div class="val" style="font-size:13px">需 2 次以上經期才能估算</div></div>`);
  }
  stat.innerHTML = boxes.join('');

  const hint = document.getElementById('predictHint');
  hint.textContent = p.intervals.length
    ? `依 ${p.periodStarts.length} 次經期推估（排卵＝下次經期 −14 天）`
    : '';
}

/* ---------- 整體渲染 ---------- */
function renderAll(){
  const pl = document.getElementById('profileLabel');
  const bits = [];
  if(state.profile.name) bits.push(state.profile.name);
  if(state.profile.chart) bits.push('#'+state.profile.chart);
  pl.textContent = bits.join(' ');
  refreshSyncDot();
  renderBackupReminder();
  renderReminder();
  renderPrediction();
  renderTabs();
  renderChart();
  renderDayList();
}
renderAll();
</script>
